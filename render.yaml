services:
  - type: web
    name: spur-assignment-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/prod.db
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_TIMEOUT_MS
        value: 30000
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
